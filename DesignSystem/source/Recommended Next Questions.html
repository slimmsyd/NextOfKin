<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kinnected · Recommended Next Questions</title>
  <link rel="stylesheet" href="../../../colors_and_type.css"/>
  <link rel="icon" href="../../../assets/kinnect-logo.png"/>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #EFEDFB;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; color: #1A1830; }
    #root { height: 100%; }
    @keyframes recq-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    @keyframes recq-rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes recq-pop {
      0%   { opacity: 0; transform: scale(0.86); }
      60%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    .recq-rise { animation: recq-rise 460ms cubic-bezier(0.16,1,0.3,1) both; }
    .recq-pop  { animation: recq-pop  460ms cubic-bezier(0.16,1,0.3,1) both; }
    /* tidy scrollbars in the thread */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(34,30,68,0.14); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(34,30,68,0.24); background-clip: padding-box; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <rect width="100" height="100" rx="16" fill="#EFEDFB"/>
      <rect x="22" y="30" width="42" height="13" rx="6" fill="#E2DEF6"/>
      <rect x="40" y="49" width="38" height="13" rx="6" fill="#5852F5"/>
      <rect x="22" y="68" width="30" height="9" rx="4.5" fill="#FFFFFF" stroke="#5852F5" stroke-opacity="0.4"/>
    </svg>
  </template>
</head>
<body data-screen-label="Recommended next questions">
