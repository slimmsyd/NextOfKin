<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kinnected · Onboarding Flow v1 · Standalone Preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; background: #ECE5D6;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; color: #13131A;
    }
    .stack { display: flex; flex-direction: column; gap: 56px; padding: 56px 48px; }
    .screen-card { background: #fff; border-radius: 18px; box-shadow: 0 28px 50px rgba(19,19,26,0.10); overflow: hidden; align-self: center; }
    .screen-label {
      align-self: center; font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase; color: #8E8B85; font-weight: 500;
      margin-bottom: 14px;
    }
  </style>
</head>
<body data-screen-label="Onboarding Flow — Standalone">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"/>

  <script type="text/babel" src="source/OnbChrome.jsx"></script>
  <script type="text/babel" src="source/OnbScreens1.jsx"></script>
  <script type="text/babel" src="source/OnbScreens2.jsx"></script>

  <script type="text/babel">
    function Preview() {
      const screens = [
        { name: '01 · Sign up',     Comp: ScreenSignup },
        { name: '02 · Welcome',     Comp: ScreenWelcome },
        { name: '03 · Consent',     Comp: ScreenConsent },
        { name: '04 · Protect',     Comp: ScreenProtect },
        { name: '05 · About you',   Comp: ScreenAbout },
        { name: '06 · Your life',   Comp: ScreenLife },
      ];
      return (
        <div className="stack">
          {screens.map(({ name, Comp }) => (
            <div key={name}>
              <div className="screen-label">{name}</div>
              <div className="screen-card"><Comp/></div>
            </div>
          ))}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
  </script>
</body>
</html>
